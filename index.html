<!DOCTYPE html>
<html lang="zh">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>我的电影收藏 · 极简版</title>
    <style>
        /* 最基础的样式，保证不花哨不出错 */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            background: #0c0b14;
            font-family: system-ui, 'Segoe UI', Roboto, sans-serif;
            padding: 30px 20px;
        }
        
        .container {
            max-width: 1200px;
            margin: 0 auto;
        }
        
        h1 {
            color: #ffd966;
            text-align: center;
            font-size: 42px;
            margin-bottom: 10px;
            letter-spacing: 2px;
        }
        
        .sub {
            text-align: center;
            color: #aaa;
            margin-bottom: 50px;
            font-size: 18px;
            border-bottom: 1px solid #333;
            padding-bottom: 20px;
        }
        
        /* 最简单的网格，3列 */
        .grid {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 30px;
        }
        
        /* 卡片样式 - 干干净净 */
        .card {
            background: #1a1a24;
            border-radius: 16px;
            overflow: hidden;
            border: 1px solid #333;
            transition: 0.2s;
        }
        
        .card:hover {
            transform: scale(1.02);
            border-color: #ffd966;
        }
        
        /* 纯色背景代替图片，绝对稳定 */
        .poster {
            width: 100%;
            height: 280px;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            color: white;
            font-size: 24px;
            font-weight: bold;
            text-shadow: 2px 2px 4px rgba(0,0,0,0.5);
        }
        
        /* 每部电影不同的背景色 */
        .m1 { background: #2e3b4e; }  /* 肖申克 - 深蓝灰 */
        .m2 { background: #4a2c2c; }  /* 霸王别姬 - 深红褐 */
        .m3 { background: #2d5a4b; }  /* 阿甘 - 森林绿 */
        .m4 { background: #5a3e2b; }  /* 杀手 - 咖啡色 */
        .m5 { background: #1e4f6b; }  /* 泰坦尼克 - 深海蓝 */
        .m6 { background: #4a3f6e; }  /* 千寻 - 紫灰 */
        
        .poster span {
            font-size: 60px;
            margin-bottom: 10px;
            opacity: 0.8;
        }
        
        .info {
            padding: 20px;
        }
        
        .title {
            color: white;
            font-size: 22px;
            font-weight: 600;
            margin-bottom: 8px;
        }
        
        .rating {
            display: flex;
            align-items: center;
            gap: 10px;
        }
        
        .stars {
            color: #ffd966;
            font-size: 18px;
            letter-spacing: 2px;
        }
        
        .score {
            color: #ffd966;
            background: rgba(255, 217, 102, 0.15);
            padding: 4px 10px;
            border-radius: 20px;
            font-size: 14px;
            font-weight: bold;
        }
        
        .footer {
            text-align: center;
            margin-top: 60px;
            color: #555;
            font-size: 14px;
        }
        
        /* 手机适配 */
        @media (max-width: 700px) {
            .grid {
                grid-template-columns: repeat(2, 1fr);
                gap: 20px;
            }
            h1 { font-size: 32px; }
        }
        
        @media (max-width: 450px) {
            .grid {
                grid-template-columns: 1fr;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>🎬 我的片单</h1>
        <div class="sub">看过的电影 · 都值得被记住</div>
        
        <div class="grid">
            <!-- 电影 1 -->
            <div class="card">
                <div class="poster m1"><span>🎥</span>肖申克的救赎</div>
                <div class="info">
                    <div class="title">肖申克的救赎</div>
                    <div class="rating">
                        <span class="stars">★★★★★</span>
                        <span class="score">9.7</span>
                    </div>
                </div>
            </div>
            
            <!-- 电影 2 -->
            <div class="card">
                <div class="poster m2"><span>🎭</span>霸王别姬</div>
                <div class="info">
                    <div class="title">霸王别姬</div>
                    <div class="rating">
                        <span class="stars">★★★★★</span>
                        <span class="score">9.6</span>
                    </div>
                </div>
            </div>
            
            <!-- 电影 3 -->
            <div class="card">
                <div class="poster m3"><span>🌳</span>阿甘正传</div>
                <div class="info">
                    <div class="title">阿甘正传</div>
                    <div class="rating">
                        <span class="stars">★★★★★</span>
                        <span class="score">9.5</span>
                    </div>
                </div>
            </div>
            
            <!-- 电影 4 -->
            <div class="card">
                <div class="poster m4"><span>🌱</span>这个杀手不太冷</div>
                <div class="info">
                    <div class="title">这个杀手不太冷</div>
                    <div class="rating">
                        <span class="stars">★★★★★</span>
                        <span class="score">9.4</span>
                    </div>
                </div>
            </div>
            
            <!-- 电影 5 -->
            <div class="card">
                <div class="poster m5"><span>🚢</span>泰坦尼克号</div>
                <div class="info">
                    <div class="title">泰坦尼克号</div>
                    <div class="rating">
                        <span class="stars">★★★★☆</span>
                        <span class="score">9.4</span>
                    </div>
                </div>
            </div>
            
            <!-- 电影 6 -->
            <div class="card">
                <div class="poster m6"><span>🏮</span>千与千寻</div>
                <div class="info">
                    <div class="title">千与千寻</div>
                    <div class="rating">
                        <span class="stars">★★★★★</span>
                        <span class="score">9.4</span>
                    </div>
                </div>
            </div>
        </div>
        
        <div class="footer">
            ⭐ 鼠标移上去会发光 · 不用图片 · 永远不崩
        </div>
    </div>
</body>
</html>
