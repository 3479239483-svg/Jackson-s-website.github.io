<!DOCTYPE html>
<html lang="zh">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>预约 · 青丝</title>
    <link rel="stylesheet" href="css/style.css">
    <style>
        .booking-container {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 3rem;
            margin: 3rem 0;
        }
        
        .info-card {
            background: #f9f5f0;
            padding: 2rem;
            border-radius: 16px;
        }
        
        .info-card h3 {
            font-weight: 400;
            margin-bottom: 1.5rem;
            color: #b69b7c;
        }
        
        .info-item {
            margin-bottom: 1.5rem;
        }
        
        .info-item h4 {
            font-weight: 500;
            margin-bottom: 0.5rem;
            color: #1a1a1a;
        }
        
        .info-item p {
            color: #666;
            line-height: 1.8;
        }
        
        .qr-code {
            width: 150px;
            height: 150px;
            background: #e8e0d5;
            margin: 1rem auto;
            display: flex;
            align-items: center;
            justify-content: center;
            color: #b69b7c;
            font-size: 0.9rem;
        }
        
        .form-card {
            background: white;
            padding: 2rem;
            border-radius: 16px;
            box-shadow: 0 4px 20px rgba(0,0,0,0.02);
        }
        
        .form-group {
            margin-bottom: 1.5rem;
        }
        
        .form-group label {
            display: block;
            margin-bottom: 0.5rem;
            color: #1a1a1a;
            font-size: 0.9rem;
        }
        
        .form-control {
            width: 100%;
            padding: 0.8rem;
            border: 1px solid #eee;
            border-radius: 8px;
            font-size: 1rem;
            transition: 0.2s;
        }
        
        .form-control:focus {
            outline: none;
            border-color: #b69b7c;
        }
        
        select.form-control {
            appearance: none;
            background: white;
        }
        
        .radio-group {
            display: flex;
            gap: 1rem;
            margin-top: 0.5rem;
        }
        
        .radio-label {
            display: flex;
            align-items: center;
            gap: 0.3rem;
            cursor: pointer;
        }
        
        .submit-btn {
            width: 100%;
            padding: 1rem;
            background: #b69b7c;
            color: white;
            border: none;
            border-radius: 40px;
            font-size: 1rem;
            cursor: pointer;
            transition: 0.3s;
        }
        
        .submit-btn:hover {
            background: #9a8065;
        }
        
        #formMessage {
            margin-top: 1rem;
            padding: 1rem;
            border-radius: 8px;
            display: none;
        }
        
        .success-message {
            background: #e8f5e9;
            color: #2e7d32;
            display: block;
        }
        
        .error-message {
            background: #ffebee;
            color: #c62828;
            display: block;
        }
        
        @media (max-width: 900px) {
            .booking-container {
                grid-template-columns: 1fr;
            }
        }
    </style>
</head>
<body>
    <nav class="navbar">
        <div class="nav-container">
            <a href="index.html" class="logo">青<span>丝</span></a>
            <div class="nav-links">
                <a href="index.html">首页</a>
                <a href="works.html">作品</a>
                <a href="price.html">价格</a>
                <a href="booking.html" class="active">预约</a>
                <a href="contact.html">联系</a>
            </div>
        </div>
    </nav>
    
    <div class="container">
        <h1 class="page-title">预约</h1>
        <div class="page-subtitle">BOOKING</div>
        
        <div class="booking-container">
            <div class="info-card">
                <h3>预约须知</h3>
                <div class="info-item">
                    <h4>⏰ 营业时间</h4>
                    <p>周二至周日 10:00 - 20:00<br>（周一休息）</p>
                </div>
                <div class="info-item">
                    <h4>📞 电话预约</h4>
                    <p>138-8888-8888<br>（建议提前一天预约）</p>
                </div>
                <div class="info-item">
                    <h4>💬 微信预约</h4>
                    <div class="qr-code">扫码添加</div>
                    <p style="text-align: center;">微信: qingsi_hair</p>
                </div>
                <div class="info-item">
                    <h4>📍 地址</h4>
                    <p>上海市静安区南京西路123号</p>
                </div>
            </div>
            
            <div class="form-card">
                <h3 style="margin-bottom: 1.5rem;">在线预约</h3>
                <form id="bookingForm">
                    <div class="form-group">
                        <label>姓名</label>
                        <input type="text" class="form-control" id="name" required>
                    </div>
                    
                    <div class="form-group">
                        <label>电话</label>
                        <input type="tel" class="form-control" id="phone" required>
                    </div>
                    
                    <div class="form-group">
                        <label>预约日期</label>
                        <input type="date" class="form-control" id="date" required>
                    </div>
                    
                    <div class="form-group">
                        <label>预约时间</label>
                        <select class="form-control" id="time">
                            <option>10:00</option>
                            <option>11:00</option>
                            <option>13:00</option>
                            <option>14:00</option>
                            <option>15:00</option>
                            <option>16:00</option>
                            <option>17:00</option>
                            <option>18:00</option>
                            <option>19:00</option>
                        </select>
                    </div>
                    
                    <div class="form-group">
                        <label>服务项目</label>
                        <div class="radio-group">
                            <label class="radio-label">
                                <input type="radio" name="service" value="剪发" checked> 剪发
                            </label>
                            <label class="radio-label">
                                <input type="radio" name="service" value="染发"> 染发
                            </label>
                            <label class="radio-label">
                                <input type="radio" name="service" value="烫发"> 烫发
                            </label>
                            <label class="radio-label">
                                <input type="radio" name="service" value="护理"> 护理
                            </label>
                        </div>
                    </div>
                    
                    <div class="form-group">
                        <label>备注（选填）</label>
                        <textarea class="form-control" rows="3" id="notes" placeholder="例如：想做的风格、参考图等"></textarea>
                    </div>
                    
                    <button type="submit" class="submit-btn">提交预约</button>
                    <div id="formMessage"></div>
                </form>
            </div>
        </div>
    </div>
    
    <footer class="footer">
        © 2026 青丝 · 质感剪发 · 预约制工作室
    </footer>
    
    <script src="js/script.js"></script>
</body>
</html>
