<!DOCTYPE html>

    <link rel="stylesheet" href="css/style.css">
    <style>
        .works-grid {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 2rem;
            margin: 3rem 0;
        }
        
        .work-card {
            background: white;
            border-radius: 16px;
            overflow: hidden;
            box-shadow: 0 4px 15px rgba(0,0,0,0.02);
            transition: 0.3s;
        }
        
        .work-card:hover {
            transform: translateY(-5px);
            box-shadow: 0 8px 25px rgba(0,0,0,0.05);
        }
        
        .work-image {
            width: 100%;
            aspect-ratio: 1;
            background: #e8e0d5;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 3rem;
            color: #b69b7c;
        }
        
        .work-info {
            padding: 1.5rem;
        }
        
        .work-info h3 {
            font-weight: 400;
            margin-bottom: 0.5rem;
        }
        
        .work-info p {
            color: #b69b7c;
            font-size: 0.9rem;
        }
        
        .work-tags {
            display: flex;
            gap: 0.5rem;
            margin-top: 1rem;
        }
        
        .tag {
            background: #f0eeea;
            padding: 0.3rem 0.8rem;
            border-radius: 20px;
            font-size: 0.8rem;
            color: #666;
        }
        
        @media (max-width: 900px) {
            .works-grid {
                grid-template-columns: repeat(2, 1fr);
            }
        }
        
        @media (max-width: 600px) {
            .works-grid {
                grid-template-columns: 1fr;
            }
        }
    </style>
</head>
