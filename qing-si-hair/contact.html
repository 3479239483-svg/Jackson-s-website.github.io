<!DOCTYPE html>
<html lang="zh">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>联系我们 · 青丝</title>
    <link rel="stylesheet" href="css/style.css">
    <style>
        .contact-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 3rem;
            margin: 3rem 0;
        }
        
        .contact-info {
            background: white;
            padding: 2rem;
            border-radius: 16px;
            box-shadow: 0 4px 20px rgba(0,0,0,0.02);
        }
        
        .contact-item {
            margin-bottom: 2rem;
            padding-bottom: 2rem;
            border-bottom: 1px solid #f0eeea;
        }
        
        .contact-item:last-child {
            border-bottom: none;
            padding-bottom: 0;
        }
        
        .contact-item h3 {
            font-weight: 400;
            color: #b69b7c;
            margin-bottom: 1rem;
        }
        
        .contact-item p {
            color: #666;
            line-height: 1.8;
            font-size: 1.1rem;
        }
        
        .contact-item .small {
            font-size: 0.9rem;
            color: #999;
        }
        
        .map-placeholder {
            background: #e8e0d5;
            height: 300px;
            border-radius: 16px;
            display: flex;
            align-items: center;
            justify-content: center;
            color: #b69b7c;
            font-size: 1rem;
        }
        
        .social-links {
            display: flex;
            gap: 1rem;
            margin-top: 1rem;
        }
        
        .social-link {
            width: 40px;
            height: 40px;
            background: #f0eeea;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            text-decoration: none;
            color: #1a1a1a;
            transition: 0.2s;
        }
        
        .social-link:hover {
            background: #b69b7c;
            color: white;
        }
        
        @media (max-width: 700px) {
            .contact-grid {
                grid-template-columns: 1fr;
            }
        }
    </style>
</head>
<body>

                <a href="booking.html">预约</a>

    </nav>

                    <p>上海市静安区南京西路123号<br><span class="small">地铁2号线静安寺站步行5分钟</span></p>
                </div>
                
                <div class="contact-item">

                </div>
                
                <div class="contact-item">

                </div>
                
                <div class="contact-item">

                </div>

            </div>
            
            <div>

            </div>
        </div>
    </div>
    
    <footer class="footer">

</body>
